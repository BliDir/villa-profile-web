name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run test

  draft-release:
    name: Draft Release
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete existing draft releases
        run: |
          gh release list --json tagName,isDraft \
            --jq '.[] | select(.isDraft) | .tagName' \
            | xargs -r -I{} gh release delete {} --yes --cleanup-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create draft release
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          gh release create "draft-${SHORT_SHA}" \
            --draft \
            --title "Draft — ${SHORT_SHA}" \
            --generate-notes \
            --target "$GITHUB_SHA"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
