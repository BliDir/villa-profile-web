name: CI

on:
  push:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run test

  draft-release:
    name: Draft Release
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Delete existing draft releases
        run: |
          gh release list --json tagName,isDraft \
            --jq '.[] | select(.isDraft) | .tagName' \
            | while IFS= read -r tag; do
                gh release delete "$tag" --yes 2>/dev/null || true
                gh api --method DELETE \
                  "repos/$GITHUB_REPOSITORY/git/refs/tags/$tag" 2>/dev/null || true
              done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create draft release
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          gh release create "draft-${SHORT_SHA}" \
            --draft \
            --title "Draft — ${SHORT_SHA}" \
            --generate-notes \
            --target "$GITHUB_SHA"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
