worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Temp paths writable by non-root nginx user
    client_body_temp_path /tmp/client_body;
    proxy_temp_path       /tmp/proxy;
    fastcgi_temp_path     /tmp/fastcgi;
    uwsgi_temp_path       /tmp/uwsgi;
    scgi_temp_path        /tmp/scgi;

    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    server_tokens off;
    sendfile      on;

    # Log to Docker stdout/stderr
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    gzip         on;
    gzip_vary    on;
    gzip_types   text/plain text/css application/javascript application/json
                 image/svg+xml image/x-icon font/woff2;

    server {
        listen 8080;
        root  /usr/share/nginx/html;
        index index.html;

        # ── Security headers ────────────────────────────────────────────────
        add_header X-Frame-Options            "SAMEORIGIN"                          always;
        add_header X-Content-Type-Options     "nosniff"                             always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'; font-src 'self'; frame-ancestors 'none';"
            always;

        # ── Default: serve files, fallback to index.html ────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── Vite hashed assets — safe to cache forever ───────────────────────
        location /assets/ {
            expires    1y;
            add_header Cache-Control              "public, immutable"                    always;
            add_header X-Frame-Options            "SAMEORIGIN"                          always;
            add_header X-Content-Type-Options     "nosniff"                             always;
            add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
            add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
            add_header Content-Security-Policy
                "default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'; font-src 'self'; frame-ancestors 'none';"
                always;
        }

        # ── Block hidden files (.git, .env, etc.) ────────────────────────────
        location ~ /\. {
            deny all;
        }
    }
}
